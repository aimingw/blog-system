# =============================================
# 博客系统后端配置文件
# =============================================

# 服务端口
server:
  port: 8088

# Spring 配置
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML文件位置
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      # 主键自增策略
      id-type: auto
      # 逻辑删除字段
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    # 驼峰命名转换（如 nick_name -> nickName）
    map-underscore-to-camel-case: true
    # SQL日志输出（开发环境开启）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  # Base64编码的HMAC-SHA256密钥
  secret: TXlCbG9nSldUU2VjcmV0S2V5Rm9ySFMyNTZBbGdvcml0aG1NdXN0QmVBdExlYXN0MjU2Qml0c0xvbmc=
  # Token过期时间（毫秒），默认7天
  expiration: 604800000

# 日志配置
logging:
  level:
    com.blog: debug
